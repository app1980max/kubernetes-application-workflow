name: Terraform Kubernetes

on:
  push:
    branches:
      - main
    paths:
      - "*.tf"
  pull_request:
    branches:
      - main
    paths:
      - "*.tf"


jobs:
  terraform:
    name: Terraform
    runs-on: ubuntu-latest

    env:
      TF_VERSION: 1.10.4  # Set your Terraform version
      AWS_ACCESS_KEY_ID: ${{ secrets.MINIO_ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.MINIO_SECRET_KEY }}
      
    steps:
      # 1️⃣ Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Setup Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # 3️⃣ Configure Kubeconfig
      - name: Setup Kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      # 4️⃣ Terraform Init
      - name: Terraform Init
        run: terraform init -input=false \
          -backend-config="endpoint=${{ secrets.MINIO_ENDPOINT }}"

      # 5️⃣ Terraform Format Check (optional)
      - name: Terraform fmt
        run: terraform fmt -recursive

      # 6️⃣ Terraform Validate
      - name: Terraform Validate
        run: terraform validate
        
      # 7️⃣ Terraform Plan
      - name: Terraform Plan
        id: plan
        run: terraform plan -out=tfplan

      # 8️⃣ Terraform Apply (only on main branch)
      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -input=false -auto-approve tfplan 
