name: Terraform Kubernetes

on:
  push:
    branches:
      - main
    paths:
      - "*.tf"
  pull_request:
    branches:
      - main
    paths:
      - "*.tf"

jobs:
  terraform:
    name: Terraform
    runs-on: ubuntu-latest

    env:
      TF_VERSION: 1.10.4

      # 🔐 MinIO credentials (from GitHub Secrets)
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: us-east-1
      AWS_EC2_METADATA_DISABLED: "true"

      # 🔥 IMPORTANT for MinIO compatibility
      AWS_S3_FORCE_PATH_STYLE: "true"

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Setup Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # 3️⃣ Configure Kubeconfig
      - name: Setup Kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Clean Terraform cache
        run: |
          rm -rf .terraform
          rm -f .terraform.lock.hcl
          
      # 4️⃣ Terraform Init (MinIO backend)
      - name: Terraform Init
        run: terraform init -input=false

      # 5️⃣ Terraform Format Check
      - name: Terraform fmt
        run: terraform fmt -recursive

      # 6️⃣ Terraform Validate
      - name: Terraform Validate
        run: terraform validate

      # 7️⃣ Terraform Plan
      - name: Terraform Plan
        id: plan
        run: terraform plan -out=tfplan

      # 8️⃣ Terraform Apply (only on main branch)
      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -input=false -auto-approve tfplan
